server_name: "matrix.local"
listeners:
  - port: 8008
    bind_addresses: ['0.0.0.0']
    type: http
    resources:
      - names: [client, federation]
        compress: false

public_baseurl: "http://localhost:8008/"
enable_registration: true

oidc_providers:
  - idp_id: "keycloak"
    idp_name: "Keycloak"
    issuer: "http://keycloak:8080/realms/master"
    client_id: "synapse"
    client_secret: "synapse-secret"
    scopes: ["openid", "profile", "email", "offline_access"]
    allow_existing_users: true

refresh_tokens: true

database:
  name: psycopg2
  args:
    user: synapse
    password: synapse
    database: synapse
    host: postgres
